name: Amazon Storage Gateway
description: >-
  AWS Storage Gateway is a hybrid cloud storage service that provides on-premises access to virtually unlimited cloud
  storage. It seamlessly connects on-premises environments to AWS cloud storage, providing low-latency data access with
  local caching.
