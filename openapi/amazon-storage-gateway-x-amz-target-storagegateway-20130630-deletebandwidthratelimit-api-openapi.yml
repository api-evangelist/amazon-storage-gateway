        GatewayARN: arn:aws:storagegateway:us-east-1:111122223333:gateway/sgw-12A3456B
      properties:
        GatewayARN:
          $ref: '#/components/schemas/GatewayARN'
      description: A JSON object containing the Amazon Resource Name (ARN) of the gateway whose bandwidth rate information was deleted.
    BandwidthType:
      type: string
      minLength: 3
      maxLength: 25
    GatewayARN:
      type: string
      description: The Amazon Resource Name (ARN) of the gateway. Use the <a>ListGateways</a> operation to return a list of gateways for your account and Amazon Web Services Region.
      minLength: 50
      maxLength: 500
    InvalidGatewayRequestException: {}
    DeleteBandwidthRateLimitInput:
      type: object
      required:
      - GatewayARN
      - BandwidthType
      title: DeleteBandwidthRateLimitInput
      properties:
        GatewayARN:
          $ref: '#/components/schemas/GatewayARN'
        BandwidthType:
          allOf:
          - $ref: '#/components/schemas/BandwidthType'
          - description: '<p>One of the BandwidthType values that indicates the gateway bandwidth rate limit to delete.</p> <p>Valid Values: <code>UPLOAD</code> | <code>DOWNLOAD</code> | <code>ALL</code> </p>'
      description: <p>A JSON object containing the following fields:</p> <ul> <li> <p> <a>DeleteBandwidthRateLimitInput$BandwidthType</a> </p> </li> </ul>
