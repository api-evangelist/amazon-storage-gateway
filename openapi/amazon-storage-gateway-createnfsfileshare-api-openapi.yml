openapi: 3.1.0
info:
  title: 'Amazon Storage Gateway REST Amazon Storage Gateway REST API #CreateNFSFileShare API'
  description: AWS Storage Gateway is a hybrid cloud storage service that gives you on-premises access to virtually unlimited cloud storage. This API enables management of gateways, volumes, virtual tapes, file shares, and cached storage resources.
  version: '2013-06-30'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://aws.amazon.com/service-terms/
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
servers:
- url: https://storagegateway.{region}.amazonaws.com
  description: Amazon Storage Gateway regional endpoint
  variables:
    region:
      default: us-east-1
      description: AWS region
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-west-2
      - eu-central-1
      - ap-northeast-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-south-1
      - sa-east-1
security:
- sigv4: []
tags:
- name: '#CreateNFSFileShare'
paths:
  /#CreateNFSFileShare:
    post:
      summary: Amazon Storage Gateway Create NFS File Share
      description: Creates a Network File System (NFS) file share on an existing S3 File Gateway.
      operationId: createNFSFileShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/CreateNFSFileShareInput'
      responses:
        '200':
          description: Successful response
      x-amz-target: StorageGateway_20130630.CreateNFSFileShare
      tags:
      - '#CreateNFSFileShare'
components:
  schemas:
    CreateNFSFileShareInput:
      type: object
      required:
      - ClientToken
      - GatewayARN
      - Role
      - LocationARN
      properties:
        ClientToken:
          type: string
        GatewayARN:
          type: string
        Role:
          type: string
        LocationARN:
          type: string
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
externalDocs:
  description: Amazon Storage Gateway API Reference
  url: https://docs.aws.amazon.com/storagegateway/latest/APIReference/Welcome.html
